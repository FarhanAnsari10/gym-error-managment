workflows:
  react-native-ios:
    name: Gym App iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS (IPA)
        script: |
          # build-ipa is a Codemagic helper that handles xcodebuild under the hood
          xcode-project build-ipa \
            --workspace ios/GymApp.xcworkspace \
            --scheme GymApp
    artifacts:
      - build/ios/ipa/*.ipa